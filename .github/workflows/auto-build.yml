name: action自动构建打包（前后端）
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # ========== 第一步：构建后端（Java） ==========
      - name: 配置JDK 21（后端）
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # 后端Maven缓存（适配backend目录）
          cache-dependency-path: backend/pom.xml  # 指定后端pom.xml路径

      - name: 后端Maven构建打包
        run: mvn clean package -DskipTests
        working-directory: ./backend  # 进入后端目录执行构建

      # ========== 第二步：构建前端 ==========
      - name: 配置Node.js 20（前端）
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 前端安装依赖并构建
        run: npm i && npm run build
        working-directory: ./frontend  # 进入前端目录执行构建

      # ========== 第三步：上传构建产物 ==========
      - name: 上传后端jar包
        uses: actions/upload-artifact@v4
        with:
          name: 后端构建包
          path: backend/target/*.jar  # 后端产物路径
          retention-days: 30

      - name: 上传前端静态文件
        uses: actions/upload-artifact@v4
        with:
          name: 前端构建包
          path: frontend/dist  # 前端产物路径（通用dist目录，可根据你的项目调整）
          retention-days: 30
      - name: 微信通知构建成功
        if: success()
        run: |
          COMMITS=$(git log ${{ github.event.before }}..${{ github.sha }} --format='· %s (%an)' --no-merges 2>/dev/null || echo "· 无法获取提交记录")
          CONTENT="✅ GitHub自动构建完成"
          CONTENT="${CONTENT}\n项目：${{ github.repository }}"
          CONTENT="${CONTENT}\n分支：${{ github.ref_name }}"
          CONTENT="${CONTENT}\n提交记录：\n${COMMITS}"
          CONTENT="${CONTENT}\n构建产物下载：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST ${{ secrets.QYWX_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"text\",
            \"text\": {
              \"content\": \"${CONTENT}\"
            }
          }"

      - name: 微信通知构建失败
        if: failure()
        run: |
          COMMITS=$(git log ${{ github.event.before }}..${{ github.sha }} --format='· %s (%an)' --no-merges 2>/dev/null || echo "· 无法获取提交记录")
          CONTENT="❌ GitHub自动构建失败"
          CONTENT="${CONTENT}\n项目：${{ github.repository }}"
          CONTENT="${CONTENT}\n分支：${{ github.ref_name }}"
          CONTENT="${CONTENT}\n提交记录：\n${COMMITS}"
          CONTENT="${CONTENT}\n查看日志：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST ${{ secrets.QYWX_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"text\",
            \"text\": {
              \"content\": \"${CONTENT}\"
            }
          }"
