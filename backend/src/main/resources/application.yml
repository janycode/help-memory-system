# 应用配置
spring:
  application:
    name: my-new-work

  # 数据源配置 - 使用 H2 本地文件数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:../data/mynewwork;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password: 

  # H2 控制台配置
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Redis配置 (可选，如果没有Redis则禁用)
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: 

# Jasypt加密配置
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:mySecretKey}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

# JWT配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGeneration}
  expiration: 86400000

# 应用特定配置
app:
  # 文件存储路径
  file-storage:
    upload-dir: ./uploads
    max-file-size: 10MB

  # 安全配置
  security:
    cors-allowed-origins: http://localhost:5173,http://localhost:3000
    password-min-length: 6

  # 加密敏感字段配置
  encryption:
    sensitive-fields: password,username,url

  # 系统默认配置
  system:
    title: 助记单
    version: 1.0.0

# 日志配置
logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    com.example.mynewwork: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/application.log
